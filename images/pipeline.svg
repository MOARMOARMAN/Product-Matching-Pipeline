<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .box { fill: #0f172a; stroke: #38bdf8; stroke-width: 1.5; rx: 10; ry: 10; }
      .box2 { fill: #111827; stroke: #a78bfa; stroke-width: 1.5; rx: 10; ry: 10; }
      .box3 { fill: #0b1220; stroke: #34d399; stroke-width: 1.5; rx: 10; ry: 10; }
      .final { fill: #111827; stroke: #f59e0b; stroke-width: 2; rx: 12; ry: 12; }

      .text { fill: #e5e7eb; font-family: Inter, Arial, sans-serif; font-size: 14px; }
      .title { fill: #ffffff; font-size: 16px; font-weight: 600; }

      .arrow { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"></polygon>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">
    Cross-Retailer Product Matching Engine (System Design)
  </text>

  <!-- Inputs -->
  <rect x="80" y="100" width="260" height="70" class="box"></rect>
  <text x="210" y="130" text-anchor="middle" class="text">Raw Retailer Dataset A</text>

  <rect x="80" y="200" width="260" height="70" class="box"></rect>
  <text x="210" y="230" text-anchor="middle" class="text">Raw Retailer Dataset B</text>

  <!-- Adapter -->
  <rect x="400" y="150" width="300" height="80" class="box2"></rect>
  <text x="550" y="185" text-anchor="middle" class="text">Product Adapter Layer</text>

  <!-- Pipeline -->
  <rect x="750" y="80" width="360" height="60" class="box"></rect>
  <text x="930" y="115" text-anchor="middle" class="text">Text Normalization Pipeline</text>

  <rect x="750" y="160" width="360" height="60" class="box"></rect>
  <text x="930" y="195" text-anchor="middle" class="text">TF-IDF Vectorization</text>

  <rect x="750" y="240" width="360" height="60" class="box"></rect>
  <text x="930" y="275" text-anchor="middle" class="text">Chunked Cosine Similarity Search</text>

  <rect x="750" y="320" width="360" height="60" class="box"></rect>
  <text x="930" y="355" text-anchor="middle" class="text">Top-K Candidate Retrieval</text>

  <!-- Scoring -->
  <rect x="750" y="400" width="360" height="60" class="box2"></rect>
  <text x="930" y="435" text-anchor="middle" class="text">Hybrid Scoring (TF-IDF + Levenshtein)</text>

  <!-- Decision -->
  <rect x="750" y="480" width="360" height="60" class="box3"></rect>
  <text x="930" y="515" text-anchor="middle" class="text">Confidence Thresholding</text>

  <!-- Branches -->
  <rect x="520" y="600" width="300" height="70" class="final"></rect>
  <text x="670" y="630" text-anchor="middle" class="text">Confirmed Matches</text>

  <rect x="860" y="600" width="300" height="70" class="box2"></rect>
  <text x="1010" y="630" text-anchor="middle" class="text">LLM Validation (Gemini / OpenAI)</text>

  <rect x="860" y="700" width="300" height="70" class="final"></rect>
  <text x="1010" y="730" text-anchor="middle" class="text">Final Matched Product Pairs</text>

  <!-- Arrows -->
  <line x1="340" y1="135" x2="400" y2="180" class="arrow"></line>
  <line x1="340" y1="235" x2="400" y2="180" class="arrow"></line>

  <line x1="700" y1="190" x2="750" y2="110" class="arrow"></line>
  <line x1="700" y1="190" x2="750" y2="190" class="arrow"></line>

  <line x1="930" y1="140" x2="930" y2="160" class="arrow"></line>
  <line x1="930" y1="220" x2="930" y2="240" class="arrow"></line>
  <line x1="930" y1="300" x2="930" y2="320" class="arrow"></line>
  <line x1="930" y1="380" x2="930" y2="400" class="arrow"></line>
  <line x1="930" y1="460" x2="930" y2="480" class="arrow"></line>

  <!-- Split -->
  <line x1="930" y1="540" x2="670" y2="600" class="arrow"></line>
  <line x1="930" y1="540" x2="1010" y2="600" class="arrow"></line>

  <line x1="1010" y1="670" x2="1010" y2="700" class="arrow"></line>

</svg>